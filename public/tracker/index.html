<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Test Tracker</title>
    <link rel="stylesheet" href="/tracker/style.css">
</head>
<body>
    <div id="app">
        <!-- Edit Modal -->
        <div id="edit-modal" class="modal">
            <div class="modal-content">
                <h2 id="modal-title">新建记录</h2>
                <form id="task-form">
                    <input type="hidden" id="task-id">

                    <div class="form-row">
                        <div class="form-group flex-2">
                            <label>测试名称</label>
                            <input type="text" id="task-test-name" placeholder="测试名称" required>
                        </div>
                        <div class="form-group flex-1">
                            <label>发布者</label>
                            <input type="text" id="task-publisher" placeholder="发布者">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>开始日</label>
                            <input type="text" id="task-start-date" placeholder="YYYY-MM-DD">
                        </div>
                        <div class="form-group">
                            <label>结束日</label>
                            <input type="text" id="task-end-date" placeholder="YYYY-MM-DD">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>工时</label>
                            <input type="text" id="task-work-time" placeholder="e.g. 8h">
                        </div>
                        <div class="form-group">
                            <label>收入1</label>
                            <input type="text" id="task-income1" placeholder="e.g. 500">
                        </div>
                        <div class="form-group">
                            <label>到账1</label>
                            <input type="text" id="task-received-date1" placeholder="YYYY-MM-DD">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>支付</label>
                            <input type="text" id="task-payment" placeholder="e.g. 100">
                        </div>
                        <div class="form-group">
                            <label>收入2</label>
                            <input type="text" id="task-income2" placeholder="e.g. 500">
                        </div>
                        <div class="form-group">
                            <label>到账2</label>
                            <input type="text" id="task-received-date2" placeholder="YYYY-MM-DD">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>Test Case</label>
                            <textarea id="task-test-case" placeholder="Test Case" rows="2"></textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>Test Result</label>
                            <textarea id="task-test-result" placeholder="Test Result" rows="2"></textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>Gamepack</label>
                            <textarea id="task-gamepack" placeholder="Gamepack" rows="2"></textarea>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="submit" class="btn-primary">保存</button>
                        <button type="button" id="cancel-edit" class="btn-secondary">取消</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <header>
            <h1>Game Test Tracker</h1>
        </header>

        <div id="toolbar">
            <button id="btn-new" class="btn btn-primary">新建</button>
            <button id="btn-edit" class="btn" disabled>编辑</button>
            <button id="btn-delete" class="btn btn-danger" disabled>删除</button>
            <button id="btn-up" class="btn" disabled>上移</button>
            <button id="btn-down" class="btn" disabled>下移</button>
            <button id="btn-export" class="btn">导出</button>
            <input type="file" id="file-import" accept=".xlsx,.xls" hidden>
            <button id="btn-import" class="btn">导入</button>
        </div>

        <div id="task-grid">
            <div class="grid-header">
                <div class="grid-cell">No</div>
                <div class="grid-cell">TestName</div>
                <div class="grid-cell">发布者</div>
                <div class="grid-cell">开始日</div>
                <div class="grid-cell">结束日</div>
                <div class="grid-cell"></div>
                <div class="grid-cell">工时</div>
                <div class="grid-cell">收入1</div>
                <div class="grid-cell">到账1</div>
                <div class="grid-cell">支付</div>
                <div class="grid-cell">收入2</div>
                <div class="grid-cell">到账2</div>
            </div>
            <div id="grid-body"></div>
        </div>

        <p id="status-message"></p>
    </div>

    <script>
        var script = document.createElement("script");
        script.src = "/tracker/app.js?v=" + Date.now();
        document.body.appendChild(script);
    </script>
</body>
</html>
